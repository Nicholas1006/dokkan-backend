name: Dokkan Asset Updater

on:
  schedule:
    - cron: '0 * * * *'  # Runs every 30 minutes
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-assets:
    runs-on: windows-latest
    env:
      DEVEXCEPTIONS: ${{ vars.DEVEXCEPTIONS }}
      GLOBALPARSE: ${{ vars.GLOBALPARSE }}
      MAKEJSON: ${{ vars.MAKEJSON }}
      DEBUG: ${{ vars.DEBUG }}
      CALCPASSIVE: ${{ vars.CALCPASSIVE }}
      CALCLINKS: ${{ vars.CALCLINKS }}
      CALCLEADER: ${{ vars.CALCLEADER }}
      CALCHIPO: ${{ vars.CALCHIPO }}
      CALCACTIVE: ${{ vars.CALCACTIVE }}
      CALCSUPERATTACK: ${{ vars.CALCSUPERATTACK }}
      CALCLEVELS: ${{ vars.CALCLEVELS }}
      CALCBASIC: ${{ vars.CALCBASIC }}
      CALCMULTIPLIER: ${{ vars.CALCMULTIPLIER }}
      CALCFINISH: ${{ vars.CALCFINISH }}
      CALCSTANDBY: ${{ vars.CALCSTANDBY }}
      CALCCIRCLE: ${{ vars.CALCCIRCLE }}

    steps:
      - name: Checkout Backend Repository
        uses: actions/checkout@v3

      - name: Save GlbAssetVersion state before running Dokkan_Asset_Downloader
        id: before_state
        run: |
          if (Test-Path "Dokkan_Asset_Downloader\settings.json") {
            $settings = Get-Content -Raw -Path "Dokkan_Asset_Downloader\settings.json" | ConvertFrom-Json
            $glbAssetVersion = $settings.GlbAssetVersion
            $glbDbVersion = $settings.GlbDbVersion
          } else {
            $glbAssetVersion = "no_file"
            $glbDbVersion = "no_file"
          }
          echo "glbAssetVersionBefore=$glbAssetVersion" >> $env:GITHUB_OUTPUT
          echo "glbDbVersionBefore=$glbDbVersion" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Run Dokkan_Asset_Downloader
        run: |
          cd "Dokkan_Asset_Downloader"  || exit /b 1
          (
            echo 1
            echo.
          ) | Dokkan_Asset_Downloader_v2.5.2_WIN_x64.exe
        shell: cmd

      - name: Save GlbAssetVersion state after running Dokkan_Asset_Downloader
        id: after_state
        run: |
          if (Test-Path "Dokkan_Asset_Downloader\settings.json") {
            $settings = Get-Content -Raw -Path "Dokkan_Asset_Downloader\settings.json" | ConvertFrom-Json
            $glbAssetVersion = $settings.GlbAssetVersion
            $glbDbVersion = $settings.GlbDbVersion
          } else {
            $glbAssetVersion = "no_file"
            $glbDbVersion = "no_file"
          }
          echo "glbDbVersionAfter=$glbDbVersion" >> $env:GITHUB_OUTPUT
          echo "glbAssetVersionAfter=$glbAssetVersion" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Check if GlbAssetVersion has changed
        id: check_changes
        run: |
          if ("${{ steps.before_state.outputs.glbAssetVersionBefore }}" -ne "${{ steps.after_state.outputs.glbAssetVersionAfter }}" -or "${{ steps.before_state.outputs.glbDbVersionBefore }}" -ne "${{ steps.after_state.outputs.glbDbVersionAfter }}") {
            echo "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "changed=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Configure AWS Credentials
        if: steps.check_changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Upload Assets to S3
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          # Upload binary assets to S3
          aws s3 sync "Dokkan_Asset_Downloader\temp_downloads" s3://dokkan-calc-assets
        shell: pwsh
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.11'  # Change this to your required Python version

      - name: Install Python Dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          pip install -r requirements.txt
        shell: cmd

      - name: Create Temp jsons Folder
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          mkdir temp_jsons
          mkdir temp_jsons\jsons
          mkdir temp_jsons\jsonsEZA
          mkdir temp_jsons\jsonsSEZA
          mkdir temp_jsons\uniqueJsons
          mkdir temp_jsons\uniqueJsons\unitBasics
        shell: cmd

      - name: Run Database and JSON Scripts
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python Database_expander.py
          python dokkan_Json_creator.py
          python uniqueJsonCreator.py
        shell: cmd

      - name: Checkout Frontend Repository
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/checkout@v3
        with:
          repository: Niccccccccccccc/dokkan-frontend
          token: ${{ secrets.FRONTEND_REPO_PAT }}
          path: frontend


      - name: Copy Updated JSON Files to Frontend
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          xcopy /E /Y "temp_jsons" "frontend\dbManagement"
        shell: cmd

      - name: Commit and Push Changes to Frontend
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd frontend
          git config --global user.email "horvat.nicholas@gmail.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Automated update of Dokkan assets" || echo "No changes to commit"
          git push
        shell: cmd

      - name: Checkout Backend Repository
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/checkout@v3
        with:
          repository: Niccccccccccccc/dokkan-backend
          token: ${{ secrets.BACKEND_REPO_PAT }}
          path: backend

      - name: Copy Updated backend Files to Backend
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          xcopy /E /Y "Dokkan_Asset_Downloader\settings.json" "backend\Dokkan_Asset_Downloader\settings.json"
          xcopy /E /Y "data" "backend\data"
        shell: cmd

      - name: Commit and Push Updated Settings & CSVs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd backend
          git config --global user.email "horvat.nicholas@gmail.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Automated update of Dokkan assets" || echo "No changes to commit"
          git push
        shell: cmd